[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true

ws-icon-0 = web;’é¼
ws-icon-1 = file;’ü╝
ws-icon-2 = text;’üä
ws-icon-3 = media;’Ćü
ws-icon-4 = game;’å░
ws-icon-5 = sys;’äē

#ws-icon-0 = 1;’äĀ
#ws-icon-1 = 2;’ē®
#ws-icon-2 = 3;’ü╝
#ws-icon-3 = 4;’üä
#ws-icon-4 = 5;’ĆĮ
#ws-icon-5 = 6;’Ćü
#ws-icon-6 = 7;’äē
#ws-icon-default = "’ē¼ "
#icons:
# ’é¼  ’ćŗ ’ć╗ ’āā ’ĆŠ ’ŗå ’å░ ’äĀ  ’ē® ’ĆĮ ;’Ćü

format = <label-state> <label-mode>

label-focused = %icon%
#label-focused-background = ${colors.background}
label-focused-background = ${colors.active}
#label-focused-underline= ${colors.active}
#label-focused-overline= ${colors.active}
label-focused-padding = 2
label-focused-foreground = ${colors.alert}

label-occupied = %icon%
label-occupied-padding = 2
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.occupied}

label-urgent = %icon%
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 2
label-empty-background = ${colors.background}
label-monocle = " ’ü« "
label-monocle-foreground = ${colors.blue}
label-tiled = " ’ĆŖ "
label-tiled-foreground = ${colors.blue}
label-fullscreen = " ’üź "
label-fullscreen-foreground = ${colors.blue}
label-floating = " ’ŗÉ "
label-floating-foreground = ${colors.blue}
label-pseudotiled = " ’ĆŖ "
label-pseudotiled-foreground = ${colors.blue}
label-locked = " ’ĆŻ "
label-locked-foreground = ${colors.blue}
label-sticky = " ’éŹ "
label-sticky-foreground = ${colors.blue}
label-private =  "   ’ēł  "
label-private-foreground = ${colors.blue}

; Separator in between workspaces
;label-separator = |
;label-separator-padding = 10
;label-separator-foreground = #ffb52a

format-foreground = ${colors.foreground}
format-background = ${colors.background}

################################################################################

[module/mpd]
;https://github.com/jaagr/polybar/wiki/Module:-mpd
type = internal/mpd

;;host = 127.0.0.1
;;port = 6600
;;password = mysecretpassword
;interval = 2
;format-online =  "<icon-prev>  <icon-stop>  <toggle>  <icon-next> <label-song>"
;format-online =  "<label-song>   <icon-prev>  <icon-stop>  <toggle>  <icon-next>"
;format-online =  "<label-song>  <bar-progress>"
;format-online =  "<label-song>  <bar-progress> <icon-prev>  <icon-stop>  <toggle>  <icon-next>"
; Available tokens:
;   %artist%
;   %album-artist%
;   %album%
;   %date%
;   %title%
; Default: %artist% - %title%
label-song = %title% - %album%

format-online =  "<label-song>"

icon-prev = ’üē
icon-stop = ’üŹ
icon-play = ’üŗ
icon-pause = ’üī
icon-next = ’üÉ
label-song-maxlen = 40
;label-song-ellipsis = true
label-song-ellipsis = false
bar-progress-width = 10
bar-progress-indicator = ’üö
bar-progress-fill = ’üö
bar-progress-empty = ’üö
bar-progress-fill-foreground = ${colors.red}
bar-progress-fill-background = ${colors.background}
bar-progress-indicator-foreground = ${colors.foreground}
format-online-foreground = ${colors.foreground}
format-online-background = ${colors.background}

################################################################################

[module/xwindow]
;https://github.com/jaagr/polybar/wiki/Module:-xwindow
type = internal/xwindow

; Available tokens:
;   %title%
; Default: %title%
label = %title%
label-maxlen = 50

format-foreground = ${colors.foreground}
format-background = ${colors.background}

###############################################################################

[module/time]
type = internal/date

interval = 1.0

time = %H:%M
time-alt = %A, %d %B %Y

format = <label>
#format-prefix = "’ü│ "
format-prefix = "’ĆŚ "
format-prefix-font = 6
;format-prefix-foreground = #c1941a
format-prefix-foreground = ${colors.foreground}

label = %time%
label-font = 3
format-foreground = ${colors.foreground}
format-background = ${colors.background}

###############################################################################

[module/battery]
;https://github.com/jaagr/polybar/wiki/Module:-battery
type = internal/battery
battery = BAT0
adapter = AC0
full-at = 90

format-charging = <animation-charging> <label-charging>
#label-charging = ’üö %percentage%%
label-charging = %percentage%%
format-charging-foreground = ${colors.foreground}
format-charging-background = ${colors.background}
;format-charging-underline = #a3c725

format-discharging = <ramp-capacity> <label-discharging>
;label-discharging = ’üō %percentage%%
label-discharging = %percentage%%
;format-discharging-underline = #c7ae25
format-discharging-foreground = ${colors.foreground}
;format-discharging-background = ${colors.red}
format-dischaging-background = ${colors.background}

format-full-prefix = "’ēĆ "
format-full-prefix-foreground = ${colors.green}
;format-full-underline = #a3c725
format-full-foreground = ${colors.foreground}
format-full-background = ${colors.background}

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = #c7ae25
ramp-capacity-0-foreground = ${colors.red}
ramp-capacity-1-foreground = ${colors.red}

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-foreground = #a3c725
animation-charging-framerate = 750

################################################################################

[module/filesystem]
;https://github.com/jaagr/polybar/wiki/Module:-filesystem
type = internal/fs

; Mountpoints to display
mount-0 = /
mount-1 = /home
;mount-2 = /var

; Seconds to sleep between updates
; Default: 30
interval = 30

; Display fixed precision values
; Default: false
fixed-values = false

; Spacing between entries
; Default: 2
spacing = 4

; Available tags:
;   <label-mounted> (default)
;   <bar-free>
;   <bar-used>
;   <ramp-capacity>
format-mounted = <label-mounted>
format-mounted-foreground = ${colors.foreground}
format-mounted-background = ${colors.background}
;format-mounted-underline = #fe0000

; Available tokens:
;   %mountpoint%
;   %type%
;   %fsname%
;   %percentage_free%
;   %percentage_used%
;   %total%
;   %free%
;   %used%
; Default: %mountpoint% %percentage_free%%
label-mounted = %mountpoint% : %percentage_free% %

; Available tokens:
;   %mountpoint%
; Default: %mountpoint% is not mounted
label-unmounted = %mountpoint% not mounted
format-unmounted-foreground = ${colors.foreground}
format-unmounted-background = ${colors.background}
;format-unmounted-underline = ${colors.alert}

################################################################################

[module/networkspeeddown]
;https://github.com/jaagr/polybar/wiki/Module:-network
type = internal/network
interface = wlp0s20f3
label-connected = "%downspeed:7%"
format-connected = <label-connected>
format-connected-prefix = "’üŻ"
format-connected-prefix-foreground = ${colors.foreground}
format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
;format-connected-underline = #62FF00

################################################################################

[module/networkspeedup]
;https://github.com/jaagr/polybar/wiki/Module:-network
type = internal/network
interface = wlp0s20f3
label-connected = "%upspeed:7%"
format-connected = <label-connected>
format-connected-prefix = "’üó"
format-connected-prefix-foreground = ${colors.foreground}
format-connected-foreground = ${colors.foreground}
format-connected-background = ${colors.background}
;format-connected-underline = #62FF00

################################################################################

[module/wifi]
type = internal/network
#interface = wlan0
interface = wlp0s20f3
interval = 3.0

format-connected = <ramp-signal> <label-connected>
; format-connected-underline = #9f78e1
label-connected = %essid%
label-connected-foreground = ${colors.foreground}
label-connected-background = ${colors.background}

format-disconnected = "’¬®No Signal"
;format-disconnected = <label-disconnected>
;format-disconnected-underline = ${self.format-connected-underline}
;label-disconnected = %ifname% disconnected
;label-disconnected-foreground = ${colors.foreground-alt}

ramp-signal-0 = ’ć½
ramp-signal-1 = ’ć½
ramp-signal-2 = ’ć½
ramp-signal-3 = ’ć½
ramp-signal-4 = ’ć½
ramp-signal-foreground = ${colors.blue1}
ramp-signal-background = ${colors.background}

