[module/bspwm]
type = internal/bspwm

enable-click = true
enable-scroll = true
reverse-scroll = true
pin-workspaces = true

ws-icon-0 = web;´éČ
ws-icon-1 = file;´ü╝
ws-icon-2 = text;´üä
ws-icon-3 = media;´Çü
ws-icon-4 = game;´ć░
ws-icon-5 = sys;´äë

#ws-icon-0 = 1;´äá
#ws-icon-1 = 2;´ëę
#ws-icon-2 = 3;´ü╝
#ws-icon-3 = 4;´üä
#ws-icon-4 = 5;´ÇŻ
#ws-icon-5 = 6;´Çü
#ws-icon-6 = 7;´äë
#ws-icon-default = "´ëČ "
#icons:
# ´éČ  ´çő ´ç╗ ´ââ ´Çż ´őć ´ć░ ´äá  ´ëę ´ÇŻ ;´Çü

format = <label-state> <label-mode>

label-focused = %icon%
#label-focused-background = ${colors.background}
label-focused-background = ${colors.active}
#label-focused-underline= ${colors.active}
#label-focused-overline= ${colors.active}
label-focused-padding = 2
label-focused-foreground = ${colors.alert}

label-occupied = %icon%
label-occupied-padding = 2
label-occupied-background = ${colors.background}
label-occupied-foreground = ${colors.occupied}

label-urgent = %icon%
label-urgent-padding = 2

label-empty = %icon%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 2
label-empty-background = ${colors.background}
label-monocle = " ´ü« "
label-monocle-foreground = ${colors.blue}
label-tiled = " ´ÇŐ "
label-tiled-foreground = ${colors.blue}
label-fullscreen = " ´üą "
label-fullscreen-foreground = ${colors.blue}
label-floating = " ´őÉ "
label-floating-foreground = ${colors.blue}
label-pseudotiled = " ´ÇŐ "
label-pseudotiled-foreground = ${colors.blue}
label-locked = " ´Çú "
label-locked-foreground = ${colors.blue}
label-sticky = " ´éŹ "
label-sticky-foreground = ${colors.blue}
label-private =  "   ´ëł  "
label-private-foreground = ${colors.blue}

; Separator in between workspaces
;label-separator = |
;label-separator-padding = 10
;label-separator-foreground = #ffb52a

format-foreground = ${colors.foreground}
format-background = ${colors.background}

################################################################################

[module/mpd]
;https://github.com/jaagr/polybar/wiki/Module:-mpd
type = internal/mpd

;;host = 127.0.0.1
;;port = 6600
;;password = mysecretpassword
;interval = 2
;format-online =  "<icon-prev>  <icon-stop>  <toggle>  <icon-next> <label-song>"
;format-online =  "<label-song>   <icon-prev>  <icon-stop>  <toggle>  <icon-next>"
;format-online =  "<label-song>  <bar-progress>"
;format-online =  "<label-song>  <bar-progress> <icon-prev>  <icon-stop>  <toggle>  <icon-next>"
; Available tokens:
;   %artist%
;   %album-artist%
;   %album%
;   %date%
;   %title%
; Default: %artist% - %title%
label-song = %title% - %album%

format-online =  "<label-song>"

icon-prev = ´üë
icon-stop = ´üŹ
icon-play = ´üő
icon-pause = ´üî
icon-next = ´üÉ
label-song-maxlen = 40
;label-song-ellipsis = true
label-song-ellipsis = false
bar-progress-width = 10
bar-progress-indicator = ´üö
bar-progress-fill = ´üö
bar-progress-empty = ´üö
bar-progress-fill-foreground = ${colors.red}
bar-progress-fill-background = ${colors.background}
bar-progress-indicator-foreground = ${colors.foreground}
format-online-foreground = ${colors.foreground}
format-online-background = ${colors.background}
################################################################################

[module/xwindow]
;https://github.com/jaagr/polybar/wiki/Module:-xwindow
type = internal/xwindow

; Available tokens:
;   %title%
; Default: %title%
label = %title%
label-maxlen = 50

format-foreground = ${colors.foreground}
format-background = ${colors.background}

###############################################################################
[module/time]
type = internal/date

interval = 1.0

time = %H:%M
time-alt = %A, %d %B %Y

format = <label>
#format-prefix = "´ü│ "
format-prefix = "´ÇŚ "
format-prefix-font = 6
;format-prefix-foreground = #c1941a
format-prefix-foreground = ${colors.foreground}

label = %time%
label-font = 3
format-foreground = ${colors.foreground}
format-background = ${colors.background}

